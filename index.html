<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>華丸かれんの占いの時間❤数秘術かんたん計算</title>

<style>
body {
  font-family: "Hiragino Mincho ProN", serif;
  text-align: center;
  padding: 30px;
  background: #f7f3f5;
}

.container {
  background: #ffffff;
  padding: 35px;
  border-radius: 16px;
  max-width: 420px;
  margin: auto;
  box-shadow: 0 6px 15px rgba(0,0,0,0.08);
}

h2 {
  color: #a85c7a;
  margin-bottom: 25px;
  font-weight: normal;
  line-height: 1.5;
}

input {
  font-size: 16px;
  padding: 10px;
  margin: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: #fafafa;
  width: 80%;
}

button {
  font-size: 16px;
  padding: 12px 28px;
  margin: 15px;
  border-radius: 25px;
  border: none;
  background: #a85c7a;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #8d4a64;
}

.result {
  font-size: 18px;
  margin-top: 25px;
  color: #333;
  line-height: 1.8;
}

.fate {
  font-size: 22px;
  color: #8d4a64;
  font-weight: bold;
  margin: 10px 0;
}

.cycle {
  margin-top: 20px;
}

/* ★追加：中央の年だけ太字 */
.highlight-year {
  font-weight: bold;
}

.small {
  font-size: 12px;
  margin-top: 25px;
  color: #777;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">

<img src="logo1.png" alt="ロゴ" style="width: 100%; max-width: 320px; margin-bottom: 20px;">

<h2>
数秘術かんたん計算
</h2>

<input type="text" id="birthdate" placeholder="生年月日（例：19780427）"><br>
<input type="text" id="targetYear" placeholder="占いたい年（例：2026）"><br>

<button onclick="calculate()">占う</button>

<div class="result" id="result"></div>
<div class="result cycle" id="cycle"></div>

<div class="small">
※数秘術における人生の9年サイクルは誕生日が起点となります。自動計算では、その年（西暦）の誕生日からのサイクルが表示されますので、その年にまだ誕生日を迎えていない方は、前年度のサイクルをご覧ください。
</div>

</div>

<script>
function reduceNumber(num, allowMaster = []) {
  while (!allowMaster.includes(num) && num > 9) {
    num = num.toString().split('').reduce((a,b)=>a+Number(b),0);
  }
  return num;
}

function calculate() {
  const birth = document.getElementById("birthdate").value;
  const targetYear = parseInt(document.getElementById("targetYear").value);

  if (birth.length !== 8 || !targetYear) {
    alert("正しい形式で入力してください");
    return;
  }

  const year = parseInt(birth.substring(0,4));
  const month = parseInt(birth.substring(4,6));
  const day = parseInt(birth.substring(6,8));

  const destiny = reduceNumber(day, [11]);
  const fate = reduceNumber(year + month + day, [11,22,33]);
  const mission = reduceNumber(month + day, [11]);
  const heaven = reduceNumber(destiny + fate + mission, []);

  document.getElementById("result").innerHTML =
    `宿命数：${destiny}<br>
     <div class="fate">運命数：${fate}</div>
     使命数：${mission}<br>
     天命数：${heaven}`;

  let cycleHTML = "<br><strong>人生の9年周期</strong><br>";

  for (let y = targetYear - 2; y <= targetYear + 2; y++) {
    let cycleNum = reduceNumber(y + month + day, []);
    
    // ★ここを修正：中央の年だけ太字
    if (y === targetYear) {
      cycleHTML += `<span class="highlight-year">${y}年：${cycleNum}</span><br>`;
    } else {
      cycleHTML += `${y}年：${cycleNum}<br>`;
    }
  }

  document.getElementById("cycle").innerHTML = cycleHTML;
}
</script>

</body>
</html>
